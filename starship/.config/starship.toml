palette = "catppuccin_macchiato"
add_newline = true

format = """
$directory $git_branch$git_status$fill
$line_break$status$character"""

right_format = """$cmd_duration$time"""

[directory]
format = "[\uE0B6](fg:blue)[ \uF07B $path ](bold fg:base bg:blue)[\uE0B0](fg:blue)"
truncation_length = 3
truncation_symbol = ".../"
home_symbol = "~"

[directory.substitutions]
"Development" = "Dev"

[git_branch]
format = "[\uE0B6](fg:surface0)[ \uE0A0 $branch ](fg:text bg:surface0)[\uE0B0](fg:surface0)"

[git_status]
format = " [$all_status$ahead_behind](yellow)"
ahead = "\u2191${count}"
behind = "\u2193${count}"
diverged = "\u2191${ahead_count}\u2193${behind_count}"
untracked = "?${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "x${count}"
stashed = "*${count}"

[fill]
symbol = " "

[cmd_duration]
min_time = 2_000
format = "[\uE0B2](fg:surface1)[ \uF252 $duration ](fg:text bg:surface1)[\uE0B4](fg:surface1) "

[time]
disabled = false
format = "[\uE0B2](fg:surface0)[ \uF017 $time ](fg:text bg:surface0)[\uE0B4](fg:surface0)"
time_format = "%H:%M"

[status]
disabled = false
format = "[\u2718 $status ](red)"

[character]
success_symbol = "[\u276F](lavender)"
error_symbol = "[\u276F](red)"

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
